<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream House Epoxy Pro Sol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --main: #0056b3;
      --accent: #ff6600;
      --bg: #f7f7f7;
      --text: #333;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: white;
      border-bottom: 2px solid var(--accent);
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
    }
    header h1 {
      color: var(--main);
      font-size: 1.4rem;
      font-weight: 700;
    }
    nav a {
      color: var(--text);
      text-decoration: none;
      margin: 0 1rem;
      font-weight: 600;
      transition: color 0.3s;
    }
    nav a:hover {
      color: var(--accent);
    }
    .lang-switch {
      cursor: pointer;
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 5px;
      font-weight: 600;
    }
    section {
      padding: 6rem 1.5rem 4rem;
      max-width: 1100px;
      margin: auto;
    }
    .hero {
      background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      color: white;
      text-align: center;
      padding: 9rem 1rem;
      border-bottom: 4px solid var(--accent);
    }
    .hero h2 {
      font-size: 2.5rem;
    }
    .hero p {
      margin: 1rem 0 2rem;
    }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.8rem 1.2rem;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #e55a00;
    }
    .services, .about, .contact {
      background: white;
      margin-top: 2rem;
      border-radius: 10px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .services h3, .gallery h3, .about h3, .contact h3 {
      color: var(--main);
      margin-bottom: 1rem;
      text-align: center;
    }
    .service-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
    }
    .service-item {
      background: var(--bg);
      border-left: 5px solid var(--accent);
      padding: 1rem;
      border-radius: 8px;
    }
    .gallery img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 1rem;
      object-fit: cover;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    input, textarea {
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    footer {
      text-align: center;
      background: var(--main);
      color: white;
      padding: 1.5rem;
      margin-top: 2rem;
      font-size: 0.9rem;
    }
    @media (max-width: 768px) {
      header {
        flex-direction: column;
      }
      nav {
        margin-top: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Dream House Epoxy Pro Sol</h1>
    <nav>
      <a href="#home">Accueil</a>
      <a href="#services">Services</a>
      <a href="#gallery">Réalisations</a>
      <a href="#about">À propos</a>
      <a href="#contact">Contact</a>
    </nav>
    <button class="lang-switch" id="langBtn">EN</button>
  </header>

  <section class="hero" id="home">
    <h2 data-fr="Des sols durables, beaux et résistants" data-en="Durable, Beautiful and Strong Floors"></h2>
    <p data-fr="Ouagadougou et partout au Burkina Faso" data-en="Ouagadougou and throughout Burkina Faso"></p>
    <button class="btn" data-fr="Demandez un devis gratuit" data-en="Get a free quote"></button>
  </section>

  <section class="services" id="services">
    <h3 data-fr="Nos Services" data-en="Our Services"></h3>
    <div class="service-list">
      <div class="service-item" data-fr="Sols époxy industriels" data-en="Industrial Epoxy Floors"></div>
      <div class="service-item" data-fr="Sols de garage design" data-en="Designer Garage Floors"></div>
      <div class="service-item" data-fr="Réparation et entretien" data-en="Repair and Maintenance"></div>
      <div class="service-item" data-fr="Application au rouleau et au pistolet" data-en="Roller and Spray Application"></div>
    </div>
  </section>

  <section class="gallery" id="gallery">
    <h3 data-fr="Nos Réalisations" data-en="Our Projects"></h3>
    <img src="https://images.unsplash.com/photo-1616627989028-7e46de7a2a42?auto=format&fit=crop&w=800&q=80" alt="Epoxy floor Qatar">
    <img src="https://images.unsplash.com/photo-1594495894542-7c4b91a708c5?auto=format&fit=crop&w=800&q=80" alt="Garage floor">
    <img src="https://images.unsplash.com/photo-1616627564733-9ebc7762ddbe?auto=format&fit=crop&w=800&q=80" alt="Industrial floor">
  </section>

  <section class="about" id="about">
    <h3 data-fr="À propos" data-en="About"></h3>
    <p data-fr="Dream House Epoxy Pro Sol met son expertise internationale, acquise au Qatar, au service de vos projets de sols industriels et de garage. Nous offrons des solutions durables, esthétiques et adaptées à tous les environnements." 
       data-en="Dream House Epoxy Pro Sol brings its international expertise, acquired in Qatar, to your industrial and garage flooring projects. We provide durable and aesthetic solutions for all environments."></p>
  </section>

  <section class="contact" id="contact">
    <h3 data-fr="Contactez-nous" data-en="Contact Us"></h3>
    <form action="https://formspree.io/f/maykpvld" method="POST">
      <input type="text" name="name" placeholder="Nom / Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <textarea name="message" rows="5" placeholder="Votre message / Your message"></textarea>
      <button class="btn" data-fr="Envoyer" data-en="Send"></button>
    </form>
    <p>📧 <a href="mailto:arnaudramde20@gmail.com">arnaudramde20@gmail.com</a></p>
    <p>📱 WhatsApp: <a href="https://wa.me/22671347787" target="_blank">+226 71347787</a></p>
  </section>

  <footer>
    © 2026 Dream House Epoxy Pro Sol – Tous droits réservés.
  </footer>

  <script>
    // Gestion du changement de langue
    const langBtn = document.getElementById('langBtn');
    let currentLang = 'fr';
    function updateLanguage() {
      document.querySelectorAll('[data-fr]').forEach(el => {
        el.textContent = el.getAttribute(`data-${currentLang}`);
      });
    }
    updateLanguage();
    langBtn.addEventListener('click', () => {
      currentLang = currentLang === 'fr' ? 'en' : 'fr';
      langBtn.textContent = currentLang === 'fr' ? 'EN' : 'FR';
      updateLanguage();
    });
  </script>
</body>
</html>
